name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist

      - name: Generate release tag
        id: tag
        run: |
          BASE=$(node -p "require('./package.json').version" | grep -oP '^\d+\.\d+')
          PATCH=$(git tag --list "v${BASE}.*" | wc -l)
          VERSION="${BASE}.$((PATCH + 1))"
          TAG="v${VERSION}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Bump package.json version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version ${{ steps.tag.outputs.version }} --no-git-tag-version
          git add package.json package-lock.json
          git commit -m "chore: bump version to ${{ steps.tag.outputs.version }} [skip ci]"
          git push origin master

      - name: Generate release notes
        id: notes
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          FULL_SHA=${GITHUB_SHA}
          COMMIT_MSG=$(git log -1 "${GITHUB_SHA}" --pretty=format:"%s")
          COMMIT_AUTHOR=$(git log -1 "${GITHUB_SHA}" --pretty=format:"%an")
          COMMIT_DATE=$(git log -1 "${GITHUB_SHA}" --pretty=format:"%ad" --date=format:"%Y-%m-%d %H:%M:%S UTC")

          # Collect commits since last tag (or all if no tags exist)
          LAST_TAG=$(git describe --tags --abbrev=0 "${GITHUB_SHA}" 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            CHANGELOG=$(git log "${LAST_TAG}..${GITHUB_SHA}" --pretty=format:"- %s (%an, %ad)" --date=format:"%Y-%m-%d" | head -20)
          else
            CHANGELOG=$(git log "${GITHUB_SHA}" --pretty=format:"- %s (%an, %ad)" --date=format:"%Y-%m-%d" | head -20)
          fi

          # Write multi-line notes to file to avoid quoting issues
          cat > /tmp/release_notes.md << NOTES
          ## Deployment ${{ steps.tag.outputs.tag }}

          **Deployed:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          **Commit:** [\`${SHORT_SHA}\`](https://github.com/${{ github.repository }}/commit/${FULL_SHA})
          **Author:** ${COMMIT_AUTHOR}
          **Commit date:** ${COMMIT_DATE}
          **Message:** ${COMMIT_MSG}

          **Live site:** https://${{ github.repository_owner }}.github.io/contextualizer/

          ### Changes in this release
          ${CHANGELOG}
          NOTES

          echo "notes_file=/tmp/release_notes.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Release ${{ steps.tag.outputs.tag }}"
          body_path: ${{ steps.notes.outputs.notes_file }}
          make_latest: true
